<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flavia's Personal Space</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://images.unsplash.com/photo-1536780767112-ab451520f064?q=80&w=764&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            color: black;
            margin-bottom: 20px;
        }
        .emoji-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .heart {
            font-size: 4rem;
            color: red;
            animation: bounce 2s infinite;
        }
        .donkey {
            font-size: 4rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .heart, .donkey {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Flavia's personal space</h1>
        <div class="emoji-container">
            <div class="heart">❤️</div>
            <div class="donkey">🐴</div>
        </div>
        <p style="margin-top: 20px; font-size: 1.2rem; color: #333; background-color: rgba(255, 255, 255, 0.7); padding: 10px; border-radius: 5px;">
            I'm an artist and an accountant. Recently, I discovered vibe coding and want to use it as a means to create art and explore creative solutions to everyday problems.
        </p>
        <p style="margin-top: 20px; font-style: italic; color: #555;">
            "Art is my passion, numbers are my precision."
        </p>

    </div>
</body>
</html>
